<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Reviews - MediaReview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="Assets/styles/main.css?v=1.2">
    <link rel="stylesheet" href="Assets/styles/responsive.css">
    <script src="/Assets/scripts/navBar.js"></script>
    <script type="module" src="/Assets/scripts/auth.js"></script>

</head>
<body class="bg-slate-900 text-slate-100 font-sans">

    <div id="nav-placeholder"></div>

    <!-- Main Content Area -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <div class="text-center mb-6 browse-header">
            <h1 class="text-2xl sm:text-3xl font-bold text-white tracking-tight mb-2">Browse Reviews</h1>
            <p class="max-w-xl mx-auto text-slate-400 text-sm">See what the community is saying.</p>
        </div>

        <!-- Search and Sort Controls -->
        <div class="bg-slate-800/50 rounded-xl border border-slate-700/50 backdrop-blur-sm p-4 mb-6">
            <div class="flex flex-col sm:flex-row gap-4">
                <div class="flex-1">
                    <div class="relative">
                        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 w-4 h-4"></i>
                        <input type="text" id="search-reviews" placeholder="Search reviews..." class="bg-slate-900 border border-slate-700 rounded-lg pl-10 pr-4 py-2 text-sm text-white focus:ring-2 focus:ring-indigo-500 outline-none w-full">
                    </div>
                </div>
                <div class="sm:w-48">
                    <div class="flex items-center gap-2">
                        <label for="sort-reviews" class="text-sm font-medium text-slate-400 whitespace-nowrap">Sort by:</label>
                        <select id="sort-reviews" class="bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:ring-2 focus:ring-indigo-500 outline-none flex-1">
                            <option value="newest">Most Recent</option>
                            <option value="oldest">Oldest First</option>
                            <option value="rating-desc">Rating (High to Low)</option>
                            <option value="rating-asc">Rating (Low to High)</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div id="reviews-container" class="space-y-4">
            <!-- Reviews populated by JavaScript function -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-slate-900 border-t border-slate-800 py-6 mt-8">
        <div class="max-w-7xl mx-auto px-4 text-center text-slate-500 text-sm">
            <p>© 2026 MediaReview. All rights reserved.</p>
        </div>
    </footer>

    <script type="module" src="Assets/scripts/browse.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
