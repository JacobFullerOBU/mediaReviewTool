<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - True Rated</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="./Assets/styles/main.css">
    <script data-goatcounter="https://truerated.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans">
    <div id="navbar-container"></div>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">

        <div id="admin-loading" class="text-center py-20">
            <p class="text-slate-400">Verifying access...</p>
        </div>

        <div id="admin-guard" class="hidden text-center py-20">
            <i data-lucide="shield-off" class="w-16 h-16 text-red-500 mx-auto mb-4"></i>
            <p class="text-red-400 text-xl font-semibold">Access Denied</p>
            <p class="text-slate-400 mt-2 text-sm">Admin privileges required to view this page.</p>
            <a href="index.html" class="mt-6 inline-block bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg text-sm font-medium transition-colors">Go to Home</a>
        </div>

        <div id="admin-content" class="hidden">
            <div class="flex items-center gap-3 mb-8">
                <div class="w-10 h-10 bg-red-700 rounded-lg flex items-center justify-center">
                    <i data-lucide="shield" class="w-5 h-5 text-white"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-white">Admin Dashboard</h1>
                    <p class="text-slate-400 text-sm">Manage reviews and user accounts</p>
                </div>
            </div>

            <!-- Stats -->
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
                <div class="bg-slate-800 rounded-xl p-5 border border-slate-700">
                    <p class="text-slate-400 text-xs uppercase tracking-wide font-medium">Total Users</p>
                    <p id="stat-users" class="text-3xl font-bold text-white mt-1">—</p>
                </div>
                <div class="bg-slate-800 rounded-xl p-5 border border-slate-700">
                    <p class="text-slate-400 text-xs uppercase tracking-wide font-medium">Total Reviews</p>
                    <p id="stat-reviews" class="text-3xl font-bold text-white mt-1">—</p>
                </div>
                <div class="bg-slate-800 rounded-xl p-5 border border-slate-700">
                    <p class="text-slate-400 text-xs uppercase tracking-wide font-medium">Media Reviewed</p>
                    <p id="stat-media" class="text-3xl font-bold text-white mt-1">—</p>
                </div>
            </div>

            <!-- Tabs -->
            <div class="flex gap-1 mb-6 border-b border-slate-700">
                <button class="admin-tab px-5 py-2.5 text-sm font-medium rounded-t-lg bg-indigo-600 text-white" data-tab="reviews">
                    Reviews
                </button>
                <button class="admin-tab px-5 py-2.5 text-sm font-medium rounded-t-lg text-slate-400 hover:text-white hover:bg-slate-800 transition-colors" data-tab="users">
                    Users
                </button>
                <button class="admin-tab px-5 py-2.5 text-sm font-medium rounded-t-lg text-slate-400 hover:text-white hover:bg-slate-800 transition-colors" data-tab="media">
                    Media
                </button>
            </div>

            <!-- Reviews Tab -->
            <div id="tab-reviews" class="admin-tab-content">
                <div class="mb-4">
                    <input type="text" id="review-search"
                           placeholder="Search by user, media title, or review content..."
                           class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-white text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div id="reviews-list" class="space-y-3">
                    <p class="text-slate-500 text-sm">Loading reviews...</p>
                </div>
            </div>

            <!-- Media Tab -->
            <div id="tab-media" class="admin-tab-content hidden">
                <!-- Create form -->
                <div class="bg-slate-800 rounded-xl border border-slate-700 p-6 mb-6">
                    <h3 class="text-white font-semibold mb-4 flex items-center gap-2">
                        <i data-lucide="plus-circle" class="w-4 h-4 text-indigo-400"></i>
                        Add New Card
                    </h3>
                    <form id="custom-media-form" class="space-y-4">
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">Title <span class="text-red-400">*</span></label>
                                <input type="text" id="cm-title" required placeholder="e.g. The Dark Knight"
                                    class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">Category <span class="text-red-400">*</span></label>
                                <select id="cm-category" required
                                    class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                                    <option value="movies">Movies</option>
                                    <option value="tv">TV</option>
                                    <option value="games">Games</option>
                                    <option value="books">Books</option>
                                    <option value="music">Music</option>
                                </select>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">Year</label>
                                <input type="number" id="cm-year" min="1880" max="2035" placeholder="e.g. 2008"
                                    class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">Genre</label>
                                <input type="text" id="cm-genre" placeholder="e.g. Action, Drama"
                                    class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">Description</label>
                            <textarea id="cm-description" rows="3" placeholder="Short synopsis..."
                                class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white text-sm focus:ring-2 focus:ring-indigo-500 outline-none resize-vertical"></textarea>
                        </div>
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">Poster URL</label>
                            <div class="flex gap-3 items-start">
                                <input type="url" id="cm-poster" placeholder="https://..."
                                    class="flex-1 bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                                <img id="cm-poster-preview" class="hidden w-12 h-16 object-cover rounded border border-slate-600 flex-shrink-0" alt="Poster preview">
                            </div>
                        </div>
                        <div id="cm-credits-row" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">Director</label>
                                <input type="text" id="cm-director"
                                    class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">Actors</label>
                                <input type="text" id="cm-actors" placeholder="Comma or newline separated"
                                    class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                            </div>
                        </div>
                        <div class="grid grid-cols-3 gap-4">
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">RT Score (0–100)</label>
                                <input type="number" id="cm-rt" min="0" max="100" step="1" placeholder="—"
                                    class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">TMDB Score (0–10)</label>
                                <input type="number" id="cm-tmdb" min="0" max="10" step="0.1" placeholder="—"
                                    class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">TR Override (0–10)</label>
                                <input type="number" id="cm-tr" min="0" max="10" step="0.1" placeholder="—"
                                    class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                            </div>
                        </div>
                        <div class="flex items-center gap-3 pt-1">
                            <button type="submit"
                                class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-5 py-2 rounded-lg transition-colors">
                                Save Card
                            </button>
                            <span id="cm-status" class="text-sm"></span>
                        </div>
                    </form>
                </div>

                <!-- Existing custom cards list -->
                <div>
                    <h3 class="text-white font-semibold mb-3">Custom Cards</h3>
                    <div id="custom-media-list" class="space-y-3">
                        <p class="text-slate-500 text-sm">Loading...</p>
                    </div>
                </div>
            </div>

            <!-- Users Tab -->
            <div id="tab-users" class="admin-tab-content hidden">
                <div id="users-list" class="space-y-3">
                    <p class="text-slate-500 text-sm">Loading users...</p>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="./Assets/scripts/auth.js"></script>
    <script type="module" src="./Assets/scripts/navBar.js"></script>

    <script type="module">
        import { auth, db } from './Assets/scripts/firebase.js';
        import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js';
        import { ref, get } from 'https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js';
        import { checkAdminStatus, deleteReview, editReview, deleteUserAccount, saveCustomMedia, getCustomMedia, deleteCustomMedia } from './Assets/scripts/admin.js';

        const loadingEl  = document.getElementById('admin-loading');
        const contentEl  = document.getElementById('admin-content');
        const guardEl    = document.getElementById('admin-guard');

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                setTimeout(() => {
                    loadingEl.classList.add('hidden');
                    guardEl.classList.remove('hidden');
                    if (window.lucide) lucide.createIcons();
                }, 1500);
                return;
            }
            const isAdmin = await checkAdminStatus(user.uid);
            loadingEl.classList.add('hidden');
            if (!isAdmin) {
                guardEl.classList.remove('hidden');
                if (window.lucide) lucide.createIcons();
                return;
            }
            contentEl.classList.remove('hidden');
            if (window.lucide) lucide.createIcons();
            await loadAdminData();
        });

        let allReviewsData = [];
        let allUsersData   = [];

        async function loadAdminData() {
            const [reviewsSnap, usersSnap] = await Promise.all([
                get(ref(db, 'reviews')),
                get(ref(db, 'reviewers'))
            ]);

            allReviewsData = [];
            if (reviewsSnap.exists()) {
                Object.entries(reviewsSnap.val()).forEach(([mediaId, mediaReviews]) => {
                    Object.entries(mediaReviews).forEach(([reviewId, review]) => {
                        allReviewsData.push({ mediaId, reviewId, ...review });
                    });
                });
            }
            allReviewsData.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

            allUsersData = [];
            if (usersSnap.exists()) {
                Object.entries(usersSnap.val()).forEach(([uid, user]) => {
                    allUsersData.push({ uid, ...user });
                });
            }

            document.getElementById('stat-users').textContent    = allUsersData.length;
            document.getElementById('stat-reviews').textContent  = allReviewsData.length;
            document.getElementById('stat-media').textContent    = new Set(allReviewsData.map(r => r.mediaId)).size;

            renderReviews(allReviewsData);
            renderUsers(allUsersData);

            document.getElementById('review-search').addEventListener('input', (e) => {
                const q = e.target.value.toLowerCase();
                renderReviews(allReviewsData.filter(r =>
                    (r.user        || '').toLowerCase().includes(q) ||
                    (r.mediaTitle  || r.mediaId || '').toLowerCase().replace(/_/g, ' ').includes(q) ||
                    (r.text        || '').toLowerCase().includes(q)
                ));
            });
        }

        function renderReviews(reviews) {
            const list = document.getElementById('reviews-list');
            if (!reviews.length) {
                list.innerHTML = '<p class="text-slate-500 text-sm">No reviews found.</p>';
                return;
            }

            list.innerHTML = reviews.map(r => {
                const snippet    = (r.text || '').slice(0, 150) + ((r.text || '').length > 150 ? '…' : '');
                const date       = r.timestamp ? new Date(r.timestamp).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }) : '';
                const mediaTitle = (r.mediaTitle || (r.mediaId || '').replace(/_/g, ' ')) || 'Unknown';

                return `
                    <div class="review-row bg-slate-800 rounded-lg p-4 border border-slate-700"
                         data-review-id="${escHtml(r.reviewId)}"
                         data-media-id="${escHtml(r.mediaId)}"
                         data-rating="${escHtml(String(r.rating))}"
                         data-plain-text="${encodeURIComponent(r.text || '')}">
                        <div class="flex flex-col sm:flex-row sm:items-start justify-between gap-3">
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-2 mb-1 flex-wrap">
                                    <span class="font-semibold text-indigo-400 text-sm">${escHtml(mediaTitle)}</span>
                                    <span class="text-yellow-400 text-xs font-bold">★ ${escHtml(String(r.rating))}/10</span>
                                    <span class="text-xs text-slate-500">${date}</span>
                                </div>
                                <p class="text-xs text-slate-400 mb-2">by ${escHtml(r.user || 'Anonymous')}</p>
                                <div class="review-snippet text-slate-300 text-sm">${escHtml(snippet)}</div>
                                <div class="review-edit-form hidden mt-3"></div>
                            </div>
                            <div class="flex gap-2 flex-shrink-0">
                                <button class="edit-review-btn text-xs bg-blue-900/60 hover:bg-blue-700 text-blue-300 px-3 py-1.5 rounded flex items-center gap-1 transition-colors">
                                    <i data-lucide="edit-2" class="w-3 h-3"></i> Edit
                                </button>
                                <button class="delete-review-btn text-xs bg-red-900/60 hover:bg-red-700 text-red-300 px-3 py-1.5 rounded flex items-center gap-1 transition-colors">
                                    <i data-lucide="trash-2" class="w-3 h-3"></i> Delete
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            if (window.lucide) lucide.createIcons();

            list.querySelectorAll('.delete-review-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const row = e.target.closest('.review-row');
                    const { reviewId, mediaId } = row.dataset;
                    const entry = allReviewsData.find(r => r.reviewId === reviewId && r.mediaId === mediaId);
                    if (!confirm(`Delete this review by ${entry?.user || 'this user'}? This cannot be undone.`)) return;
                    btn.disabled = true;
                    btn.textContent = 'Deleting…';
                    await deleteReview(mediaId, reviewId);
                    allReviewsData = allReviewsData.filter(r => !(r.reviewId === reviewId && r.mediaId === mediaId));
                    document.getElementById('stat-reviews').textContent = allReviewsData.length;
                    row.remove();
                });
            });

            list.querySelectorAll('.edit-review-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const row         = btn.closest('.review-row');
                    const { reviewId, mediaId, rating } = row.dataset;
                    const plainText   = decodeURIComponent(row.dataset.plainText || '');
                    const formEl      = row.querySelector('.review-edit-form');
                    const snippetEl   = row.querySelector('.review-snippet');

                    if (!formEl.classList.contains('hidden')) {
                        formEl.classList.add('hidden');
                        formEl.innerHTML = '';
                        snippetEl.classList.remove('hidden');
                        btn.innerHTML = '<i data-lucide="edit-2" class="w-3 h-3"></i> Edit';
                        if (window.lucide) lucide.createIcons();
                        return;
                    }

                    snippetEl.classList.add('hidden');
                    formEl.classList.remove('hidden');
                    formEl.innerHTML = `
                        <div class="space-y-2 pt-1">
                            <div class="flex items-center gap-2">
                                <label class="text-xs text-slate-400">Rating:</label>
                                <input type="number" class="edit-rating w-24 bg-slate-900 border border-slate-600 rounded px-2 py-1 text-white text-sm" min="1" max="10" step="0.5">
                            </div>
                            <textarea class="edit-text w-full bg-slate-900 border border-slate-600 rounded px-3 py-2 text-white text-sm resize-vertical" rows="4"></textarea>
                            <div class="flex gap-2">
                                <button class="save-edit-btn text-xs bg-green-700 hover:bg-green-600 text-white px-3 py-1.5 rounded transition-colors">Save Changes</button>
                                <button class="cancel-edit-btn text-xs bg-slate-700 hover:bg-slate-600 text-white px-3 py-1.5 rounded transition-colors">Cancel</button>
                            </div>
                        </div>
                    `;
                    formEl.querySelector('.edit-rating').value = rating;
                    formEl.querySelector('.edit-text').value   = plainText;

                    btn.innerHTML = 'Cancel';

                    formEl.querySelector('.cancel-edit-btn').addEventListener('click', () => {
                        formEl.classList.add('hidden');
                        formEl.innerHTML = '';
                        snippetEl.classList.remove('hidden');
                        btn.innerHTML = '<i data-lucide="edit-2" class="w-3 h-3"></i> Edit';
                        if (window.lucide) lucide.createIcons();
                    });

                    formEl.querySelector('.save-edit-btn').addEventListener('click', async () => {
                        const newText   = formEl.querySelector('.edit-text').value.trim();
                        const newRating = parseFloat(formEl.querySelector('.edit-rating').value);
                        if (!newText || isNaN(newRating) || newRating < 1 || newRating > 10) {
                            alert('Please enter valid review text and a rating between 1 and 10.');
                            return;
                        }
                        const saveBtn = formEl.querySelector('.save-edit-btn');
                        saveBtn.textContent = 'Saving…';
                        saveBtn.disabled = true;

                        await editReview(mediaId, reviewId, newText, newRating);

                        const local = allReviewsData.find(r => r.reviewId === reviewId && r.mediaId === mediaId);
                        if (local) { local.text = newText; local.rating = newRating; }

                        const newSnippet = newText.length > 150 ? newText.slice(0, 150) + '…' : newText;
                        snippetEl.textContent = newSnippet;
                        snippetEl.classList.remove('hidden');
                        row.dataset.plainText = encodeURIComponent(newText);
                        row.dataset.rating    = newRating;
                        formEl.classList.add('hidden');
                        formEl.innerHTML = '';
                        btn.innerHTML = '<i data-lucide="edit-2" class="w-3 h-3"></i> Edit';
                        if (window.lucide) lucide.createIcons();
                    });
                });
            });
        }

        function renderUsers(users) {
            const list = document.getElementById('users-list');
            if (!users.length) {
                list.innerHTML = '<p class="text-slate-500 text-sm">No users found.</p>';
                return;
            }

            list.innerHTML = users.map(u => {
                const reviewCount = allReviewsData.filter(r => r.userId === u.uid).length;
                const joinDate    = u.createdAt ? new Date(u.createdAt).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }) : 'Unknown';
                const isAdmin     = u.role === 'admin';
                const initial     = (u.name || u.email || '?')[0].toUpperCase();
                const avatarSrc   = u.photoURL || u.avatar;

                return `
                    <div class="user-row bg-slate-800 rounded-lg p-4 border border-slate-700 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3"
                         data-uid="${escHtml(u.uid)}">
                        <div class="flex items-center gap-3 min-w-0">
                            ${avatarSrc
                                ? `<img src="${escHtml(avatarSrc)}" alt="${escHtml(u.name || '')}" class="w-10 h-10 rounded-full flex-shrink-0 object-cover">`
                                : `<div class="w-10 h-10 rounded-full bg-indigo-700 flex items-center justify-center flex-shrink-0 text-white font-bold text-sm">${escHtml(initial)}</div>`
                            }
                            <div class="min-w-0">
                                <div class="flex items-center gap-2 flex-wrap">
                                    <span class="font-semibold text-white text-sm">${escHtml(u.name || 'Unknown')}</span>
                                    ${isAdmin ? '<span class="text-xs bg-red-900/60 text-red-300 px-2 py-0.5 rounded font-medium">Admin</span>' : ''}
                                </div>
                                <p class="text-xs text-slate-400 truncate">${escHtml(u.email || '')}</p>
                                <p class="text-xs text-slate-500">${reviewCount} review${reviewCount !== 1 ? 's' : ''} · Joined ${joinDate}</p>
                            </div>
                        </div>
                        <div class="flex-shrink-0">
                            ${!isAdmin
                                ? `<button class="delete-user-btn text-xs bg-red-900/60 hover:bg-red-700 text-red-300 px-3 py-1.5 rounded flex items-center gap-1 transition-colors">
                                       <i data-lucide="user-x" class="w-3 h-3"></i> Delete Account
                                   </button>`
                                : '<span class="text-xs text-slate-500 italic px-2">Protected</span>'
                            }
                        </div>
                    </div>
                `;
            }).join('');

            if (window.lucide) lucide.createIcons();

            list.querySelectorAll('.delete-user-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const row  = e.target.closest('.user-row');
                    const { uid } = row.dataset;
                    const user = allUsersData.find(u => u.uid === uid);
                    if (!confirm(`Delete account for "${user?.name || user?.email || uid}"?\n\nThis will also delete ALL of their reviews. This action cannot be undone.`)) return;
                    btn.disabled = true;
                    btn.textContent = 'Deleting…';
                    await deleteUserAccount(uid);
                    allReviewsData = allReviewsData.filter(r => r.userId !== uid);
                    allUsersData   = allUsersData.filter(u => u.uid !== uid);
                    document.getElementById('stat-users').textContent   = allUsersData.length;
                    document.getElementById('stat-reviews').textContent = allReviewsData.length;
                    row.remove();
                });
            });
        }

        function escHtml(str) {
            return String(str || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        // ── Custom Media (Media tab) ──────────────────────────────────────────────
        function slugify(str) {
            return str.trim().replace(/[^a-zA-Z0-9]/g, '_').toLowerCase();
        }

        async function loadCustomMediaList() {
            const listEl = document.getElementById('custom-media-list');
            const data = await getCustomMedia();
            const entries = Object.entries(data);
            if (!entries.length) {
                listEl.innerHTML = '<p class="text-slate-500 text-sm">No custom cards yet.</p>';
                return;
            }
            listEl.innerHTML = entries.map(([id, item]) => `
                <div class="custom-media-row bg-slate-800 rounded-lg p-4 border border-slate-700 flex items-start gap-4"
                     data-id="${escHtml(id)}">
                    ${item.poster
                        ? `<img src="${escHtml(item.poster)}" alt="${escHtml(item.title)}" class="w-12 h-16 object-cover rounded flex-shrink-0">`
                        : `<div class="w-12 h-16 bg-slate-700 rounded flex items-center justify-center flex-shrink-0"><i data-lucide="image" class="w-5 h-5 text-slate-500"></i></div>`
                    }
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 flex-wrap mb-0.5">
                            <span class="font-semibold text-white text-sm">${escHtml(item.title)}</span>
                            <span class="text-xs bg-slate-700 text-slate-300 px-2 py-0.5 rounded">${escHtml(item.category || '')}</span>
                            ${item.year ? `<span class="text-xs text-slate-500">${escHtml(String(item.year))}</span>` : ''}
                        </div>
                        ${item.genre ? `<p class="text-xs text-slate-500 mb-0.5">${escHtml(item.genre)}</p>` : ''}
                        ${item.description ? `<p class="text-xs text-slate-400 line-clamp-2">${escHtml(item.description)}</p>` : ''}
                        <p class="text-xs text-slate-600 mt-1 font-mono">id: ${escHtml(id)}</p>
                    </div>
                    <button class="delete-custom-btn text-xs bg-red-900/60 hover:bg-red-700 text-red-300 px-3 py-1.5 rounded flex items-center gap-1 transition-colors flex-shrink-0">
                        <i data-lucide="trash-2" class="w-3 h-3"></i> Delete
                    </button>
                </div>
            `).join('');
            if (window.lucide) lucide.createIcons();

            listEl.querySelectorAll('.delete-custom-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const row = btn.closest('.custom-media-row');
                    const id = row.dataset.id;
                    if (!confirm(`Delete the card "${id}"? This won't delete reviews tied to it.`)) return;
                    btn.disabled = true; btn.textContent = 'Deleting…';
                    await deleteCustomMedia(id);
                    row.remove();
                    if (!document.querySelector('.custom-media-row')) {
                        document.getElementById('custom-media-list').innerHTML =
                            '<p class="text-slate-500 text-sm">No custom cards yet.</p>';
                    }
                });
            });
        }

        // Poster preview
        document.getElementById('cm-poster')?.addEventListener('input', (e) => {
            const img = document.getElementById('cm-poster-preview');
            const url = e.target.value.trim();
            if (url) {
                img.src = url;
                img.classList.remove('hidden');
                img.onerror = () => img.classList.add('hidden');
            } else {
                img.classList.add('hidden');
            }
        });

        // Hide director/actors for non-film categories
        document.getElementById('cm-category')?.addEventListener('change', (e) => {
            const creditsRow = document.getElementById('cm-credits-row');
            const filmCats = ['movies', 'tv'];
            creditsRow.classList.toggle('hidden', !filmCats.includes(e.target.value));
        });

        // Form submit
        document.getElementById('custom-media-form')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const statusEl = document.getElementById('cm-status');
            const submitBtn = e.target.querySelector('button[type="submit"]');
            statusEl.textContent = '';
            statusEl.className = 'text-sm';

            const title    = document.getElementById('cm-title').value.trim();
            const category = document.getElementById('cm-category').value;
            const year     = document.getElementById('cm-year').value.trim();
            const genre    = document.getElementById('cm-genre').value.trim();
            const desc     = document.getElementById('cm-description').value.trim();
            const poster   = document.getElementById('cm-poster').value.trim();
            const director = document.getElementById('cm-director').value.trim();
            const actors   = document.getElementById('cm-actors').value.trim();
            const rt       = document.getElementById('cm-rt').value.trim();
            const tmdb     = document.getElementById('cm-tmdb').value.trim();
            const tr       = document.getElementById('cm-tr').value.trim();

            const id = `${slugify(category)}_${slugify(title)}`;

            const data = { title, category, source: 'custom' };
            if (year)     data.year        = parseInt(year);
            if (genre)    data.genre       = genre;
            if (desc)     data.description = desc;
            if (poster)   data.poster      = poster;
            if (director) data.director    = director;
            if (actors)   data.actors      = actors;
            if (rt)       data.rtScore     = parseInt(rt);
            if (tmdb)     data.tmdbScore   = parseFloat(tmdb);
            if (tr)       data.trScoreOverride = parseFloat(tr);

            submitBtn.disabled = true; submitBtn.textContent = 'Saving…';
            try {
                await saveCustomMedia(id, data);
                statusEl.textContent = `✓ Saved as "${id}"`;
                statusEl.className = 'text-sm text-green-400';
                e.target.reset();
                document.getElementById('cm-poster-preview').classList.add('hidden');
                document.getElementById('cm-credits-row').classList.remove('hidden');
                await loadCustomMediaList();
            } catch (err) {
                statusEl.textContent = 'Error: ' + (err.message || err);
                statusEl.className = 'text-sm text-red-400';
            }
            submitBtn.disabled = false; submitBtn.textContent = 'Save Card';
        });

        // Load custom media list when tab is opened
        document.querySelector('[data-tab="media"]')?.addEventListener('click', () => {
            loadCustomMediaList();
        });

        // Tab switching
        document.querySelectorAll('.admin-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.admin-tab').forEach(t => {
                    t.classList.remove('bg-indigo-600', 'text-white');
                    t.classList.add('text-slate-400');
                });
                tab.classList.add('bg-indigo-600', 'text-white');
                tab.classList.remove('text-slate-400');
                document.querySelectorAll('.admin-tab-content').forEach(c => c.classList.add('hidden'));
                document.getElementById(`tab-${tab.dataset.tab}`).classList.remove('hidden');
            });
        });
    </script>
</body>
</html>
