<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Details | MediaReview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <base href="/">
</head>
<body class="bg-slate-900 text-white">
    <div id="navbar-container"></div>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div id="movie-details-container" class="flex flex-col md:flex-row gap-8">
            <p>Loading movie details...</p>
        </div>
    </main>
    <style>
            body {
        transition: background 0.8s ease-in-out;
        background-color: #0f172a; /* Slate-900 fallback */
        }

        /* Fix for the prose class if you don't have the Tailwind Typography plugin */
        .prose p {
            margin-bottom: 1.5rem;
        }
        .review-content {
            color: #e2e8f0 !important; /* Forces light slate color */
        }

        /* This targets any bold text or headers inside the review text */
        .review-content b, 
        .review-content strong {
            color: #818cf8; /* Makes the "The Good/Bad" headers a nice Indigo */
            font-weight: 700;
            display: block;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            font-size: 0.875rem;
            letter-spacing: 0.05em;
        }

        /* Removes margin from the very first header */
        .review-content b:first-child, 
        .review-content strong:first-child {
            margin-top: 0;
        }

        /* Ensures any paragraphs in the review are spaced nicely */
        .review-content p {
            margin-bottom: 1rem;
        }
    </style>
    <script src="/Assets/scripts/navBar.js"></script>
    <script type="module" src="/Assets/scripts/reviewDetails.js"></script>
</body>
</html>
