<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Details | MediaReview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    </head>
<body class="bg-slate-900 text-white min-h-screen">

    <div id="navbar-container"></div>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div id="movie-details-container">
            <div class="flex items-center justify-center py-20">
                <p class="text-slate-400 animate-pulse">Loading movie details...</p>
            </div>
        </div>
    </main>

    <style>
        body {
            transition: background 0.8s ease-in-out;
            background-color: #0f172a;
        }
        .prose p { margin-bottom: 1.5rem; }
        .review-content { color: #e2e8f0 !important; }
        .review-content b, .review-content strong {
            color: #818cf8;
            font-weight: 700;
            display: block;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            font-size: 0.875rem;
            letter-spacing: 0.05em;
        }
        .review-content b:first-child, .review-content strong:first-child { margin-top: 0; }
        .review-content p { margin-bottom: 1rem; }
    </style>

    <script type="module" src="/Assets/scripts/navBar.js"></script>
    <script type="module" src="/Assets/scripts/reviewDetails.js"></script>
</body>
</html>
