<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Review Tool - Explore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="Assets/styles/main.css?v=1.2">
    <link rel="stylesheet" href="Assets/styles/responsive.css">
    <script src="/Assets/scripts/navBar.js"></script>
    <script type="module" src="/Assets/scripts/auth.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans">

    <div id="nav-placeholder"></div>

    <!-- Main Content Area -->
    <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <h2 class="text-3xl font-bold text-white mb-2">Explore Feed</h2>
        <p class="text-slate-400 mb-8">See the most recent reviews from the community.</p>
        <div id="explore-feed-container" class="space-y-6">
            <!-- Review items will be added here -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-slate-900 border-t border-slate-800 py-8 mt-12">
        <div class="max-w-7xl mx-auto px-4 text-center text-slate-500 text-sm">
            <p>© 2024 MediaReview. All rights reserved.</p>
            <div class="flex justify-center gap-4 mt-4">
                <a href="#" class="hover:text-indigo-400">Contact</a>
                <a href="#" class="hover:text-indigo-400">Privacy</a>
                <a href="#" class="hover:text-indigo-400">Top Reviewers</a>
            </div>
        </div>
    </footer>

    <script type="module" src="Assets/scripts/main.js"></script>
    <script type="module" src="Assets/scripts/auth.js"></script>
    <script type="module" src="Assets/scripts/feed.js"></script>
    <script>
        // Load icons after DOM is ready
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
