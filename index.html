<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>True Rated - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="./Assets/styles/main.css">
    <link rel="stylesheet" href="./Assets/styles/responsive.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        #cardsContainer > *, #feed-container > *, #explore-feed-container > * {
            content-visibility: auto;
            contain-intrinsic-size: 500px; 
        }
        #nav-placeholder {
            min-height: 64px;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans">
    <div id="navbar-container"></div>
    <!-- Hero Section -->
    <div class="relative overflow-hidden bg-slate-900 hero-section">
        <div class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center z-10 pb-2 md:pb-4" style="margin-bottom:0;">
            <h1 class="hero-title text-3xl sm:text-4xl md:text-5xl font-bold text-white tracking-tight mb-2">
                Discover & Review <span class="text-indigo-400">Media</span>
            </h1>
            <p class="hero-subtitle mt-2 max-w-xl mx-auto text-slate-400 text-sm">
                Join the community of reviewers sharing their thoughts on movies, shows, music, games, and books.
            </p>
            <div class="mt-3 flex justify-center">
                <button id="surprise-button" class="px-6 py-2 rounded-full bg-slate-800 border border-slate-700 hover:bg-slate-700 text-slate-300 font-semibold flex items-center justify-center gap-2 transition-all text-sm">
                    <i data-lucide="shuffle" class="w-4 h-4"></i> Surprise Me
                </button>
            </div>
            </div>
        </div>
        <div class="absolute top-0 left-1/2 w-96 h-96 bg-indigo-500/20 rounded-full blur-3xl -translate-x-1/2 -translate-y-1/2"></div>
    </div>
    <!-- Main Content Area -->
    <main id="browse-page" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <!-- Controls Toolbar -->
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-2 mb-4 bg-slate-800/50 p-3 rounded-xl border border-slate-700/50 backdrop-blur-sm mt-[-2.5rem] md:mt-[-3rem] controls-toolbar">
            <div class="flex flex-col gap-2">
                <div class="filter-buttons-container">
                    <button class="tab-btn flex items-center gap-2 px-4 py-2 rounded-full text-sm whitespace-nowrap transition-all bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-white" data-category="all"><i data-lucide="grid" class="w-4 h-4"></i> All</button>
                    <button class="tab-btn flex items-center gap-2 px-4 py-2 rounded-full text-sm whitespace-nowrap transition-all bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-white" data-category="movies"><i data-lucide="film" class="w-4 h-4"></i> Movies</button>
                    <button class="tab-btn flex items-center gap-2 px-4 py-2 rounded-full text-sm whitespace-nowrap transition-all bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-white" data-category="tv"><i data-lucide="tv" class="w-4 h-4"></i> TV</button>
                    <button class="tab-btn flex items-center gap-2 px-4 py-2 rounded-full text-sm whitespace-nowrap transition-all bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-white" data-category="music"><i data-lucide="music" class="w-4 h-4"></i> Music</button>
                    <button class="tab-btn flex items-center gap-2 px-4 py-2 rounded-full text-sm whitespace-nowrap transition-all bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-white" data-category="games"><i data-lucide="gamepad-2" class="w-4 h-4"></i> Games</button>
                    <button class="tab-btn flex items-center gap-2 px-4 py-2 rounded-full text-sm whitespace-nowrap transition-all bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-white" data-category="books"><i data-lucide="book-open" class="w-4 h-4"></i> Books</button>
                </div>
                <!-- Genre Filters -->
                <div id="genreFilterContainer" class="hidden flex-wrap gap-2 pt-1 border-t border-slate-700/50">
                </div>
            </div>
            <div class="search-and-sort-container">
                <div class="search-container">
                    <div class="relative">
                        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 w-4 h-4"></i>
                        <input type="text" id="mediaSearchInput" placeholder="Search by title, director, actors, etc..." class="bg-slate-900 border border-slate-700 rounded-lg pl-10 pr-4 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none w-full md:w-[28rem] text-slate-200 placeholder-slate-500"/>
                    </div>
                </div>
                <div class="sort-container mt-4">
                    <div class="flex flex-col items-center gap-2 w-full">
                        <select id="sortSelect" class="bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none text-slate-200 cursor-pointer w-full max-w-xs mx-auto">
                            <option value="rating-desc" selected>Highest Rated</option>
                            <option value="rating-asc">Lowest Rated</option>
                            <option value="recent-desc">Most Recently Reviewed</option>
                            <option value="year-desc">Newest First</option>
                            <option value="year-asc">Oldest First</option>
                            <option value="title-asc">Alphabetical (A-Z)</option>
                            <option value="title-desc">Alphabetical (Z-A)</option>
                        </select>
                        <div id="inTheatresCheckboxRow" class="hidden w-full max-w-xs mx-auto">
                            <label class="flex items-center gap-2 cursor-pointer select-none text-sm text-emerald-400">
                                <input type="checkbox" id="inTheatresSortCheckbox" class="accent-emerald-500 w-4 h-4 cursor-pointer">
                                In Theatres
                            </label>
                        </div>
                        <div class="apply-button-container w-full max-w-xs mx-auto">
                            <button id="applySortBtn" class="px-4 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-700 text-white font-semibold transition-all w-full">Apply</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Card Container -->
        <div id="cardsContainer" class="cards-container grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        </div>
    </main>
    <!-- Explore Feed Heading -->
    <main id="explore-feed-page" class="hidden max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <h2 class="text-3xl font-bold text-white mb-8">Explore Feed</h2>
        <div id="explore-feed-container" class="space-y-6">
        </div>
    </main>
    <!-- My Feed Page -->
    <main id="feed-page" class="hidden max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <h2 class="text-3xl font-bold text-white mb-8">My Feed</h2>
        <div id="feed-container" class="space-y-6">
        </div>
    </main>
    <!-- Footer -->
    <footer class="bg-slate-900 border-t border-slate-800 py-8 mt-12">
        <div class="max-w-7xl mx-auto px-4 text-center text-slate-500 text-sm">
            <p>© 2026 True Rated. All rights reserved.</p>
            <div class="flex justify-center gap-4 mt-4">
                <a href="#" class="hover:text-indigo-400">Contact</a>
                <a href="#" class="hover:text-indigo-400">Privacy</a>
                <a href="#" class="hover:text-indigo-400">Top Reviewers</a>
            </div>
        </div>
    </footer>
    <script type="module" src="./Assets/scripts/main.js"></script>
    <script type="module" src="./Assets/scripts/auth.js"></script>
    <script type="module" src="./Assets/scripts/community.js"></script>
    <script type="module" src="./Assets/scripts/feed.js"></script>
    <script type="module" src="./Assets/scripts/cards.js?v=1.5"></script>
    <script type="module" src="./Assets/scripts/navBar.js"></script>
    <script type="module" src="./Assets/scripts/reviewDetails.js"></script>

</body>
</html>
